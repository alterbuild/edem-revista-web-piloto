<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  body{margin:0;background:var(--surface-page);color:var(--text-body);font-family:var(--font-sans);padding:28px}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:22px}
  .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);font-weight:700;width:100%;margin-bottom:2px}

<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Badge, ArticleCard } = window.EDEMRevistaDesignSystem_7d0987;
function Demo(){
  return (
    <div>
      <div className="row"><span className="lbl">Botones</span>
        <Button variant="primary">Primary</Button>
        <Button variant="secondary">Secondary</Button>
        <Button variant="outline">Outline</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="primary" disabled>Disabled</Button>

      <div className="row"><span className="lbl">Tamaños</span>

        <Button size="md">Medium</Button>
        <Button size="lg" iconRight={<span>→</span>}>Large</Button>
      </div>
      <div className="row"><span className="lbl">Badges — ecosistema</span>
        <Badge tone="edem">Pasillo EDEM</Badge>
        <Badge tone="lanzadera">Radar Lanzadera</Badge>
        <Badge tone="angels">Angels</Badge>
        <Badge tone="neutral">Editorial</Badge>
        <Badge tone="teal" solid={false}>Outline</Badge>
      </div>
      <div className="row"><span className="lbl">Article Card</span></div>
      <div className="grid">
        <ArticleCard
          tone="lanzadera" category="Radar Lanzadera"
          title="3 startups que revolucionan el puerto de Valencia"
          excerpt="Las apuestas del último cohorte de Lanzadera que ya mueven el Mediterráneo."
          meta="6 min" />

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
