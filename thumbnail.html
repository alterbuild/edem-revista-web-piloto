<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./styles.css">
<style>
  html,body{margin:0;padding:0}
  .tile{width:1280px;height:854px;display:flex;overflow:hidden}
  .main{flex:1;background:var(--edem-teal-500);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .main img{width:58%;height:auto}
  .main span{font-family:var(--font-display);font-weight:900;font-optical-sizing:none;font-variation-settings:'opsz' 14;font-size:150px;line-height:1;color:#fff;letter-spacing:.02em}
  .strip{width:150px;display:flex;flex-direction:column}
  .strip>div{flex:1}
</style>
</head>
<body>
<div class="tile">
  <div class="main"><img src="./assets/edem-logo-white.png" alt="EDEM"><span>Times</span></div>
  <div class="strip">
    <div style="background:#d8912e"></div>
    <div style="background:#e8502d"></div>
    <div style="background:#3b3a7a"></div>
    <div style="background:#06333f"></div>
  </div>
</div>
</body>
</html>
