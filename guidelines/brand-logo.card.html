<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;font-family:var(--font-sans);background:var(--surface-page);padding:24px;display:flex;gap:18px}
.tile{flex:1;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;height:200px;border:1px solid var(--border-hair)}
.tile img{width:62%;height:auto}
.cap{position:absolute;bottom:8px;left:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.rel{position:relative}
</style></head><body>
<div class="tile rel" style="background:var(--white)"><img src="../assets/edem-logo.png" alt="EDEM"><span class="cap" style="color:var(--text-faint)">Sobre paper</span></div>
<div class="tile rel" style="background:var(--edem-teal-500)"><img src="../assets/edem-logo-white.png" alt="EDEM"><span class="cap" style="color:rgba(255,255,255,.75)">Sobre teal</span></div>
<div class="tile rel" style="background:var(--edem-teal-900)"><img src="../assets/edem-logo-white.png" alt="EDEM"><span class="cap" style="color:rgba(255,255,255,.6)">Sobre petrol</span></div>
</body></html>
