<!-- @dsCard group="Colors" viewport="760x160" name="Ecosystem — Marina de Empresas" subtitle="EDEM (real) · Lanzadera & Angels are placeholders pending official hex" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;font-family:var(--font-sans);background:var(--surface-page);padding:20px}
.row{display:flex;gap:16px}
.card{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-hair)}
.chip{height:74px;display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:700;letter-spacing:.14em;font-size:12px;text-transform:uppercase}
.meta{padding:9px 11px;background:#fff}
.name{font-weight:700;font-size:13px;color:var(--text-strong)}
.hex{font-size:11px;color:var(--text-faint);font-variant-numeric:tabular-nums;margin-top:2px}
.tag{font-size:9px;color:var(--text-faint);letter-spacing:.1em;margin-top:3px}
</style></head><body>
<div class="row">
  <div class="card"><div class="chip" style="background:var(--edem)">EDEM</div><div class="meta"><div class="name">EDEM</div><div class="hex">#008AAD</div><div class="tag">★ OFICIAL</div></div></div>
  <div class="card"><div class="chip" style="background:var(--lanzadera)">Lanzadera</div><div class="meta"><div class="name">Lanzadera</div><div class="hex">#E8502D</div><div class="tag">PLACEHOLDER</div></div></div>
  <div class="card"><div class="chip" style="background:var(--angels)">Angels</div><div class="meta"><div class="name">Angels</div><div class="hex">#3B3A7A</div><div class="tag">PLACEHOLDER</div></div></div>
</div>
</body></html>
