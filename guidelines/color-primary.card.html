<!-- @dsCard group="Colors" viewport="760x150" name="Primary — EDEM teal" subtitle="#008AAD extracted pixel-exact from the wordmark; full tint scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;font-family:var(--font-sans);background:var(--surface-page)}
.wrap{display:flex;height:150px}
.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-size:10px;font-weight:700;letter-spacing:.04em}
.h{font-size:10px;opacity:.8;font-variant-numeric:tabular-nums}
.star{position:absolute;top:8px;left:10px;font-size:11px;font-weight:700;letter-spacing:.1em}
.rel{position:relative}
</style></head><body>
<div class="wrap">
  <div class="sw" style="background:var(--edem-teal-50);color:var(--ink-700)"><div class="n">50</div><div class="h">#EEF8FB</div></div>
  <div class="sw" style="background:var(--edem-teal-100);color:var(--ink-700)"><div class="n">100</div><div class="h">#DCF0F5</div></div>
  <div class="sw" style="background:var(--edem-teal-200);color:var(--ink-800)"><div class="n">200</div><div class="h">#B4DEE9</div></div>
  <div class="sw" style="background:var(--edem-teal-300);color:var(--ink-800)"><div class="n">300</div><div class="h">#74C1D5</div></div>
  <div class="sw" style="background:var(--edem-teal-400);color:#fff"><div class="n">400</div><div class="h">#34A3C0</div></div>
  <div class="sw rel" style="background:var(--edem-teal-500);color:#fff"><div class="star">★ PRIMARY</div><div class="n">500</div><div class="h">#008AAD</div></div>
  <div class="sw" style="background:var(--edem-teal-600);color:#fff"><div class="n">600</div><div class="h">#007A99</div></div>
  <div class="sw" style="background:var(--edem-teal-700);color:#fff"><div class="n">700</div><div class="h">#006A85</div></div>
  <div class="sw" style="background:var(--edem-teal-800);color:#fff"><div class="n">800</div><div class="h">#0A4A5C</div></div>
  <div class="sw" style="background:var(--edem-teal-900);color:#fff"><div class="n">900</div><div class="h">#06333F</div></div>
</div>
</body></html>
