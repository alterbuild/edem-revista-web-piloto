<!-- @dsCard group="Colors" viewport="760x150" name="Neutrals — petrol ink & paper" subtitle="Cool slate text scale + warm off-white magazine stock" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;font-family:var(--font-sans);background:var(--surface-page)}
.wrap{display:flex;height:150px}
.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:9px}
.n{font-size:10px;font-weight:700}.h{font-size:9.5px;opacity:.8;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="wrap">
  <div class="sw" style="background:var(--ink-900);color:#fff"><div class="n">ink-900</div><div class="h">#0C1E24</div></div>
  <div class="sw" style="background:var(--ink-700);color:#fff"><div class="n">ink-700</div><div class="h">#2A3F47</div></div>
  <div class="sw" style="background:var(--ink-500);color:#fff"><div class="n">ink-500</div><div class="h">#5A6E75</div></div>
  <div class="sw" style="background:var(--ink-400);color:#fff"><div class="n">ink-400</div><div class="h">#869AA0</div></div>
  <div class="sw" style="background:var(--ink-200);color:var(--ink-800)"><div class="n">ink-200</div><div class="h">#DCE4E6</div></div>
  <div class="sw" style="background:var(--ink-100);color:var(--ink-800)"><div class="n">ink-100</div><div class="h">#EDF1F2</div></div>
  <div class="sw" style="background:var(--paper);color:var(--ink-800);border-right:1px solid var(--border-hair)"><div class="n">paper</div><div class="h">#FBFAF6</div></div>
  <div class="sw" style="background:var(--paper-deep);color:var(--ink-800)"><div class="n">paper-deep</div><div class="h">#F2EFE6</div></div>
</div>
</body></html>
